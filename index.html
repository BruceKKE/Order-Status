<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外贸订单管家 (GitHub Pages 版)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. SVG 图标组件 ---
        const IconDashboard = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconCart = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
        const IconFactory = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>;
        const IconFile = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
        const IconPlus = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconTrend = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconDollar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const IconClock = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconDownload = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconUpload = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;

        // --- 2. 核心辅助函数 ---
        const generateId = () => Math.random().toString(36).substr(2, 9);
        
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error("读取本地存储失败:", error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error("写入本地存储失败:", error);
                }
            };

            return [storedValue, setValue];
        }

        // --- 3. 主应用组件 ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');

            // --- 数据持久化状态 ---
            const [supplierContracts, setSupplierContracts] = useLocalStorage('app_contracts', []);
            const [customerPOs, setCustomerPOs] = useLocalStorage('app_pos', []);
            const [shippingCIs, setShippingCIs] = useLocalStorage('app_cis', []);

            // --- 表单当前输入状态 (新增了 quantity 字段) ---
            const [newContract, setNewContract] = useState({ contractNo: '', date: '', items: [{ id: generateId(), model: '', description: '', quantity: 1, price: '' }] });
            const [newPO, setNewPO] = useState({ poNo: '', date: '', items: [{ id: generateId(), supplierItemId: '', model: '', description: '', quantity: 1, price: '' }] });
            const [newCI, setNewCI] = useState({ ciNo: '', poId: '', date: '', paymentTerms: '', items: [{ id: generateId(), model: '', description: '', quantity: 1, price: '' }] });

            // --- 数据导入导出 ---
            const handleExport = () => {
                const data = { supplierContracts, customerPOs, shippingCIs };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `外贸订单管家备份_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.supplierContracts) setSupplierContracts(data.supplierContracts);
                        if (data.customerPOs) setCustomerPOs(data.customerPOs);
                        if (data.shippingCIs) setShippingCIs(data.shippingCIs);
                        alert("数据导入成功！");
                    } catch (err) {
                        alert("文件格式不正确，导入失败。");
                    }
                };
                reader.readAsText(file);
            };

            // --- 表单明细操作 ---
            const handleItemChange = (setter, stateObj, itemId, field, value) => {
                setter({
                    ...stateObj,
                    items: stateObj.items.map(item => item.id === itemId ? { ...item, [field]: value } : item)
                });
            };

            const handleAddItem = (setter, stateObj, emptyItemTemplate) => {
                setter({ ...stateObj, items: [...stateObj.items, emptyItemTemplate] });
            };

            const handleRemoveItem = (setter, stateObj, itemId) => {
                setter({ ...stateObj, items: stateObj.items.filter(item => item.id !== itemId) });
            };

            // --- 提交处理 ---
            const handleAddContract = (e) => {
                e.preventDefault();
                if (newContract.items.length === 0) return alert("请至少添加一个产品！");
                setSupplierContracts([{ ...newContract, id: generateId() }, ...supplierContracts]);
                setNewContract({ contractNo: '', date: '', items: [{ id: generateId(), model: '', description: '', quantity: 1, price: '' }] });
                alert("工厂合同保存成功！");
            };

            const handleAddPO = (e) => {
                e.preventDefault();
                if (newPO.items.length === 0) return alert("请至少添加一个产品！");
                setCustomerPOs([{ ...newPO, id: generateId() }, ...customerPOs]);
                setNewPO({ poNo: '', date: '', items: [{ id: generateId(), supplierItemId: '', model: '', description: '', quantity: 1, price: '' }] });
                alert("客户订单保存成功！");
            };

            const handleAddCI = (e) => {
                e.preventDefault();
                if (newCI.items.length === 0) return alert("请至少添加一个产品！");
                if (!newCI.poId) return alert("请选择关联的客户订单 (PO)！");
                setShippingCIs([{ ...newCI, id: generateId() }, ...shippingCIs]);
                setNewCI({ ciNo: '', poId: '', date: '', paymentTerms: '', items: [{ id: generateId(), model: '', description: '', quantity: 1, price: '' }] });
                alert("发货出单保存成功！");
            };

            // --- 辅助计算 (加入数量逻辑) ---
            const calculateProfit = (poPrice, poQuantity, supplierItemId) => {
                let cost = 0;
                for (const contract of supplierContracts) {
                    const item = contract.items.find(i => i.id === supplierItemId);
                    if (item) { cost = parseFloat(item.price || 0); break; }
                }
                const price = parseFloat(poPrice || 0);
                const qty = parseFloat(poQuantity || 1); // 兼容旧数据，默认数量为1
                
                const unitProfit = price - cost;
                const totalProfit = unitProfit * qty;
                const margin = price > 0 ? (unitProfit / price) * 100 : 0;
                
                return { unitProfit, totalProfit, margin, cost, qty };
            };

            const calculateDueDate = (dateStr, terms) => {
                if (!dateStr || terms === '') return null;
                const date = new Date(dateStr);
                date.setDate(date.getDate() + parseInt(terms, 10));
                return date;
            };

            const getDaysRemaining = (dueDate) => {
                if (!dueDate) return 0;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const diffTime = dueDate.getTime() - today.getTime();
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };

            // --- 视图: 仪表盘 ---
            const renderDashboard = () => {
                let totalPORenueve = 0;
                let totalProfit = 0;
                
                customerPOs.forEach(po => {
                    po.items.forEach(item => {
                        const price = parseFloat(item.price || 0);
                        const qty = parseFloat(item.quantity || 1);
                        totalPORenueve += (price * qty);
                        totalProfit += calculateProfit(price, qty, item.supplierItemId).totalProfit;
                    });
                });
                
                const avgMargin = totalPORenueve > 0 ? (totalProfit / totalPORenueve) * 100 : 0;

                const reminders = shippingCIs.map(ci => {
                    const dueDate = calculateDueDate(ci.date, ci.paymentTerms);
                    const daysLeft = getDaysRemaining(dueDate);
                    const totalAmount = ci.items.reduce((sum, item) => sum + (parseFloat(item.price || 0) * parseFloat(item.quantity || 1)), 0);
                    return { ...ci, dueDate, daysLeft, totalAmount };
                }).sort((a, b) => a.daysLeft - b.daysLeft);

                // --- 新增：PO发货进度追踪数据计算 ---
                const poProgress = customerPOs.map(po => {
                    const totalAmount = po.items.reduce((sum, item) => sum + (parseFloat(item.price || 0) * parseFloat(item.quantity || 1)), 0);
                    const relatedCIs = shippingCIs.filter(ci => ci.poId === po.id);
                    const shippedAmount = relatedCIs.reduce((sum, ci) => {
                        return sum + ci.items.reduce((ciSum, item) => ciSum + (parseFloat(item.price || 0) * parseFloat(item.quantity || 1)), 0);
                    }, 0);
                    const pendingAmount = totalAmount - shippedAmount;
                    
                    let status = '未发货';
                    if (shippedAmount >= totalAmount && totalAmount > 0) status = '已发完';
                    else if (shippedAmount > 0) status = '部分发货';

                    return { id: po.id, poNo: po.poNo, totalAmount, shippedAmount, pendingAmount, status };
                });

                return (
                    <div className="space-y-6 fade-in">
                        <h2 className="text-2xl font-bold text-slate-800">业务概览与提醒</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-blue-50 text-blue-600 rounded-xl"><IconDollar /></div>
                                <div>
                                    <p className="text-sm text-slate-500 font-medium">总销售额预估 (US$)</p>
                                    <p className="text-2xl font-bold text-slate-800">{totalPORenueve.toFixed(2)}</p>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><IconTrend /></div>
                                <div>
                                    <p className="text-sm text-slate-500 font-medium">预估总利润 (US$)</p>
                                    <p className="text-2xl font-bold text-slate-800">{totalProfit.toFixed(2)}</p>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-purple-50 text-purple-600 rounded-xl"><IconFactory /></div>
                                <div>
                                    <p className="text-sm text-slate-500 font-medium">平均利润率</p>
                                    <p className="text-2xl font-bold text-slate-800">{avgMargin.toFixed(2)}%</p>
                                </div>
                            </div>
                        </div>

                        {/* --- 新增：PO 发货进度追踪看板 --- */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-5 border-b border-slate-100 flex items-center space-x-2 bg-slate-50">
                                <span className="text-indigo-500"><IconCart /></span>
                                <h3 className="text-lg font-bold text-slate-800">PO 发货进度追踪</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[700px]">
                                    <thead>
                                        <tr className="bg-white text-slate-500 text-sm border-b border-slate-200">
                                            <th className="p-4 font-medium">PO 号码</th>
                                            <th className="p-4 font-medium">订单总额 ($)</th>
                                            <th className="p-4 font-medium">已发货金额 ($)</th>
                                            <th className="p-4 font-medium">待发货金额 ($)</th>
                                            <th className="p-4 font-medium">状态</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {poProgress.length === 0 && (
                                            <tr><td colSpan="5" className="p-8 text-center text-slate-400">暂无客户订单数据</td></tr>
                                        )}
                                        {poProgress.map(progress => (
                                            <tr key={progress.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                <td className="p-4 font-bold text-indigo-600">{progress.poNo}</td>
                                                <td className="p-4 font-semibold text-slate-800">{progress.totalAmount.toFixed(2)}</td>
                                                <td className="p-4 font-semibold text-emerald-600">{progress.shippedAmount.toFixed(2)}</td>
                                                <td className="p-4 font-semibold text-orange-500">{progress.pendingAmount.toFixed(2)}</td>
                                                <td className="p-4">
                                                    {progress.status === '已发完' ? (
                                                        <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-emerald-100 text-emerald-700">已发完</span>
                                                    ) : progress.status === '部分发货' ? (
                                                        <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-blue-100 text-blue-700">部分发货</span>
                                                    ) : (
                                                        <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-slate-100 text-slate-600">未发货</span>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-5 border-b border-slate-100 flex items-center space-x-2 bg-slate-50">
                                <span className="text-orange-500"><IconClock /></span>
                                <h3 className="text-lg font-bold text-slate-800">收款到期日历</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[700px]">
                                    <thead>
                                        <tr className="bg-white text-slate-500 text-sm border-b border-slate-200">
                                            <th className="p-4 font-medium">CI 号码</th>
                                            <th className="p-4 font-medium">发货明细 (包含数量)</th>
                                            <th className="p-4 font-medium">总金额 ($)</th>
                                            <th className="p-4 font-medium">账期 / 到期日</th>
                                            <th className="p-4 font-medium">状态</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {reminders.length === 0 && (
                                            <tr><td colSpan="5" className="p-8 text-center text-slate-400">暂无发货记录</td></tr>
                                        )}
                                        {reminders.map((ci) => (
                                            <tr key={ci.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                <td className="p-4 font-bold text-indigo-600">{ci.ciNo}</td>
                                                <td className="p-4">
                                                    {ci.items.map(i => (
                                                        <div key={i.id} className="text-sm text-slate-700">
                                                            {i.model} <span className="text-xs text-slate-400">×{i.quantity || 1}</span>
                                                        </div>
                                                    ))}
                                                </td>
                                                <td className="p-4 font-semibold text-slate-800">{ci.totalAmount.toFixed(2)}</td>
                                                <td className="p-4">
                                                    <div className="text-sm text-slate-600">{ci.paymentTerms} 天</div>
                                                    <div className="text-xs font-bold text-slate-500 mt-1">{ci.dueDate?.toLocaleDateString()}</div>
                                                </td>
                                                <td className="p-4">
                                                    {ci.daysLeft < 0 ? (
                                                        <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-red-100 text-red-700">逾期 {Math.abs(ci.daysLeft)} 天</span>
                                                    ) : ci.daysLeft <= 7 ? (
                                                        <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-orange-100 text-orange-700">即将到期 ({ci.daysLeft}天)</span>
                                                    ) : (
                                                        <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-emerald-100 text-emerald-700">正常 ({ci.daysLeft}天)</span>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 视图: 工厂合同 SC ---
            const renderSupplierContracts = () => (
                <div className="space-y-6 fade-in">
                    <h2 className="text-2xl font-bold text-slate-800">工厂采购合同 (成本基准)</h2>
                    <form onSubmit={handleAddContract} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex flex-col md:flex-row gap-4 mb-6 pb-6 border-b border-slate-100">
                            <div className="flex-1 space-y-1">
                                <label className="text-sm font-semibold text-slate-600">工厂合同号</label>
                                <input required type="text" value={newContract.contractNo} onChange={e => setNewContract({...newContract, contractNo: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="SC-..." />
                            </div>
                            <div className="flex-1 space-y-1">
                                <label className="text-sm font-semibold text-slate-600">签订日期</label>
                                <input required type="date" value={newContract.date} onChange={e => setNewContract({...newContract, date: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                            </div>
                        </div>

                        <div className="space-y-3">
                            <label className="text-sm font-semibold text-slate-600">采购产品明细</label>
                            {newContract.items.map((item) => {
                                const itemTotal = (parseFloat(item.price || 0) * parseFloat(item.quantity || 1)).toFixed(2);
                                return (
                                <div key={item.id} className="flex flex-col md:flex-row gap-3 items-start md:items-center bg-slate-50/50 p-3 rounded-lg border border-slate-100">
                                    <input required type="text" placeholder="产品型号" value={item.model} onChange={e => handleItemChange(setNewContract, newContract, item.id, 'model', e.target.value)} className="w-full md:w-[25%] p-2.5 text-sm bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    <input type="text" placeholder="描述 / 备注" value={item.description} onChange={e => handleItemChange(setNewContract, newContract, item.id, 'description', e.target.value)} className="w-full md:w-[25%] p-2.5 text-sm bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    <input required type="number" min="1" placeholder="数量" value={item.quantity} onChange={e => handleItemChange(setNewContract, newContract, item.id, 'quantity', e.target.value)} className="w-full md:w-[15%] p-2.5 text-sm bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    <input required type="number" step="0.01" placeholder="单价(成本)" value={item.price} onChange={e => handleItemChange(setNewContract, newContract, item.id, 'price', e.target.value)} className="w-full md:w-[15%] p-2.5 text-sm bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    <div className="w-full md:w-[15%] text-slate-600 text-sm font-bold pl-2">
                                        小计: ${itemTotal}
                                    </div>
                                    <div className="w-full md:w-[5%] flex justify-end">
                                        {newContract.items.length > 1 && (

                        </div>
                    </div>

                    {/* 主内容区 */}
                    <div className="flex-1 p-4 md:p-8 overflow-y-auto">
                        <div className="max-w-5xl mx-auto pb-20">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'supplier_contracts' && renderSupplierContracts()}
                            {activeTab === 'customer_pos' && renderCustomerPOs()}
                            {activeTab === 'shipping_cis' && renderShippingCIs()}
                        </div>
                    </div>
                </div>
            );
        }

        // --- 渲染到 DOM ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
