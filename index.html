<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外贸订单管家 (GitHub Pages 版)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 1. SVG 图标组件 ---
        const IconDashboard = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconCart = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
        const IconFactory = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>;
        const IconFile = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
        const IconPlus = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconTrend = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconDollar = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const IconClock = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconDownload = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconUpload = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;

        const generateId = () => Math.random().toString(36).substr(2, 9);
        
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {}
            };
            return [storedValue, setValue];
        }

        // --- 主应用组件 ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');

            // --- 数据持久化状态 (修改了Key避免旧数据冲突) ---
            const [customerPOs, setCustomerPOs] = useLocalStorage('app_pos_v3', []);
            const [supplierContracts, setSupplierContracts] = useLocalStorage('app_contracts_v3', []);
            const [shippingCIs, setShippingCIs] = useLocalStorage('app_cis_v3', []);

            // --- 录入表单状态 ---
            // PO 是核心，只录入一次产品型号、描述、售价
            const [newPO, setNewPO] = useState({ poNo: '', date: '', items: [{ id: generateId(), model: '', description: '', quantity: 1, price: '' }] });
            // SC 关联 PO，只需要输入各项成本
            const [newContract, setNewContract] = useState({ poId: '', contractNo: '', date: '', items: [] });
            // CI 关联 PO，只需要输入各项发货数量
            const [newCI, setNewCI] = useState({ poId: '', ciNo: '', date: '', paymentTerms: '', items: [] });

            // --- 数据导入导出 ---
            const handleExport = () => {
                const data = { customerPOs, supplierContracts, shippingCIs };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `外贸订单管家备份_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.customerPOs) setCustomerPOs(data.customerPOs);
                        if (data.supplierContracts) setSupplierContracts(data.supplierContracts);
                        if (data.shippingCIs) setShippingCIs(data.shippingCIs);
                        alert("数据导入成功！");
                    } catch (err) { alert("文件格式不正确，导入失败。"); }
                };
                reader.readAsText(file);
            };

            // --- 获取 PO 原始项目数据 ---
            const getPoItem = (poId, poItemId) => {
                const po = customerPOs.find(p => p.id === poId);
                return po?.items.find(i => i.id === poItemId) || {};
            };

            const getPoCost = (poId, poItemId) => {
                const sc = supplierContracts.find(c => c.poId === poId);
                const scItem = sc?.items.find(i => i.poItemId === poItemId);
                return parseFloat(scItem?.cost || 0);
            };

            // --- 表单联动处理 ---
            const handlePoChangeForSC = (poId) => {
                const po = customerPOs.find(p => p.id === poId);
                if (po) {
                    setNewContract({ ...newContract, poId, items: po.items.map(i => ({ poItemId: i.id, cost: '' })) });
                } else {
                    setNewContract({ poId: '', contractNo: '', date: '', items: [] });
                }
            };

            const handlePoChangeForCI = (poId) => {
                const po = customerPOs.find(p => p.id === poId);
                if (po) {
                    // 智能计算剩余未发数量作为默认值
                    const relatedCIs = shippingCIs.filter(ci => ci.poId === poId);
                    const itemsWithQty = po.items.map(poItem => {
                        const alreadyShipped = relatedCIs.reduce((sum, ci) => {
                            const ciItem = ci.items.find(i => i.poItemId === poItem.id);
                            return sum + (parseFloat(ciItem?.shipQty || 0));
                        }, 0);
                        const remaining = Math.max(0, parseFloat(poItem.quantity || 1) - alreadyShipped);
                        return { poItemId: poItem.id, shipQty: remaining };
                    });
                    setNewCI({ ...newCI, poId, items: itemsWithQty });
                } else {
                    setNewCI({ poId: '', ciNo: '', date: '', paymentTerms: '', items: [] });
                }
            };

            const handleItemChange = (setter, stateObj, itemId, field, value) => {
                setter({ ...stateObj, items: stateObj.items.map(item => (item.id === itemId || item.poItemId === itemId) ? { ...item, [field]: value } : item) });
            };

            // --- 提交处理 ---
            const handleAddPO = (e) => {
                e.preventDefault();
                setCustomerPOs([{ ...newPO, id: generateId() }, ...customerPOs]);
                setNewPO({ poNo: '', date: '', items: [{ id: generateId(), model: '', description: '', quantity: 1, price: '' }] });
                alert("客户订单保存成功！请前往SC或CI模块继续操作。");
            };

            const handleAddContract = (e) => {
                e.preventDefault();
                if (!newContract.poId) return alert("请先选择关联的客户订单 (PO)！");
                setSupplierContracts([{ ...newContract, id: generateId() }, ...supplierContracts]);
                setNewContract({ poId: '', contractNo: '', date: '', items: [] });
                alert("工厂合同/成本记录保存成功！");
            };

            const handleAddCI = (e) => {
                e.preventDefault();
                if (!newCI.poId) return alert("请先选择关联的客户订单 (PO)！");
                // 过滤掉发货数量为 0 的项
                const validItems = newCI.items.filter(i => parseFloat(i.shipQty) > 0);
                if (validItems.length === 0) return alert("所有产品的发货数量均为 0，无法保存！");
                setShippingCIs([{ ...newCI, items: validItems, id: generateId() }, ...shippingCIs]);
                setNewCI({ poId: '', ciNo: '', date: '', paymentTerms: '', items: [] });
                alert("发货出单保存成功！");
            };

            const togglePoCompleted = (id) => setCustomerPOs(customerPOs.map(po => po.id === id ? { ...po, isCompleted: !po.isCompleted } : po));
            const toggleCiPaid = (id) => setShippingCIs(shippingCIs.map(ci => ci.id === id ? { ...ci, isPaid: !ci.isPaid } : ci));

            // --- 辅助计算 ---
            const calculateDueDate = (dateStr, terms) => {
                if (!dateStr || terms === '') return null;
                const date = new Date(dateStr);
                date.setDate(date.getDate() + parseInt(terms, 10));
                return date;
            };

            const getDaysRemaining = (dueDate) => {
                if (!dueDate) return 0;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const diffTime = dueDate.getTime() - today.getTime();
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };

            // --- 视图: 仪表盘 ---
            const renderDashboard = () => {
                let totalPORenueve = 0;
                let totalProfit = 0;
                
                customerPOs.forEach(po => {
                    po.items.forEach(item => {
                        const price = parseFloat(item.price || 0);
                        const qty = parseFloat(item.quantity || 1);
                        const cost = getPoCost(po.id, item.id);
                        totalPORenueve += (price * qty);
                        totalProfit += ((price - cost) * qty);
                    });
                });
                const avgMargin = totalPORenueve > 0 ? (totalProfit / totalPORenueve) * 100 : 0;

                const poProgress = customerPOs.map(po => {
                    const totalAmount = po.items.reduce((sum, item) => sum + (parseFloat(item.price || 0) * parseFloat(item.quantity || 1)), 0);
                    const relatedCIs = shippingCIs.filter(ci => ci.poId === po.id);
                    const shippedAmount = relatedCIs.reduce((sum, ci) => {
                        return sum + ci.items.reduce((ciSum, ciItem) => {
                            const poItem = getPoItem(po.id, ciItem.poItemId);
                            return ciSum + (parseFloat(poItem.price || 0) * parseFloat(ciItem.shipQty || 0));
                        }, 0);
                    }, 0);
                    const pendingAmount = totalAmount - shippedAmount;
                    
                    let status = '未发货';
                    if (shippedAmount >= totalAmount && totalAmount > 0) status = '已发完';
                    else if (shippedAmount > 0) status = '部分发货';

                    return { id: po.id, poNo: po.poNo, totalAmount, shippedAmount, pendingAmount, status, isCompleted: po.isCompleted };
                });

                const reminders = shippingCIs.map(ci => {
                    const dueDate = calculateDueDate(ci.date, ci.paymentTerms);
                    const daysLeft = getDaysRemaining(dueDate);
                    const po = customerPOs.find(p => p.id === ci.poId);
                    const totalAmount = ci.items.reduce((sum, ciItem) => {
                        const poItem = getPoItem(ci.poId, ciItem.poItemId);
                        return sum + (parseFloat(poItem.price || 0) * parseFloat(ciItem.shipQty || 0));
                    }, 0);
                    return { ...ci, poNo: po?.poNo || '未知PO', dueDate, daysLeft, totalAmount };
                }).sort((a, b) => {
                    if (a.isPaid && !b.isPaid) return 1;
                    if (!a.isPaid && b.isPaid) return -1;
                    return a.daysLeft - b.daysLeft;
                });

                return (
                    <div className="space-y-6 fade-in">
                        <h2 className="text-2xl font-bold text-slate-800">业务概览与提醒</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-blue-50 text-blue-600 rounded-xl"><IconDollar /></div>
                                <div><p className="text-sm text-slate-500 font-medium">总销售额预估 (US$)</p><p className="text-2xl font-bold text-slate-800">{totalPORenueve.toFixed(2)}</p></div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><IconTrend /></div>
                                <div><p className="text-sm text-slate-500 font-medium">预估总利润 (US$)</p><p className="text-2xl font-bold text-slate-800">{totalProfit.toFixed(2)}</p></div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-purple-50 text-purple-600 rounded-xl"><IconFactory /></div>
                                <div><p className="text-sm text-slate-500 font-medium">平均利润率</p><p className="text-2xl font-bold text-slate-800">{avgMargin.toFixed(2)}%</p></div>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-5 border-b border-slate-100 flex items-center space-x-2 bg-slate-50">
                                <span className="text-indigo-500"><IconCart /></span><h3 className="text-lg font-bold text-slate-800">PO 发货进度追踪</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[700px]">
                                    <thead className="bg-white text-slate-500 text-sm border-b border-slate-200">
                                        <tr><th className="p-4 font-medium">PO 号码</th><th className="p-4 font-medium">订单总额 ($)</th><th className="p-4 font-medium">已发货金额 ($)</th><th className="p-4 font-medium">待发货金额 ($)</th><th className="p-4 font-medium">状态 / 操作</th></tr>
                                    </thead>
                                    <tbody>
                                        {poProgress.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">暂无客户订单数据</td></tr>}
                                        {poProgress.map(progress => (
                                            <tr key={progress.id} className="border-b border-slate-100 hover:bg-slate-50">
                                                <td className="p-4 font-bold text-indigo-600">{progress.poNo}</td>
                                                <td className="p-4 font-semibold text-slate-800">{progress.totalAmount.toFixed(2)}</td>
                                                <td className="p-4 font-semibold text-emerald-600">{progress.shippedAmount.toFixed(2)}</td>
                                                <td className="p-4 font-semibold text-orange-500">{progress.pendingAmount.toFixed(2)}</td>
                                                <td className="p-4 flex items-center gap-2">
                                                    {progress.isCompleted ? <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-slate-200 text-slate-600">已结单</span> : 
                                                     progress.status === '已发完' ? <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-emerald-100 text-emerald-700">已发完</span> : 
                                                     progress.status === '部分发货' ? <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-blue-100 text-blue-700">部分发货</span> : 
                                                     <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-slate-100 text-slate-600">未发货</span>}
                                                    <button onClick={() => togglePoCompleted(progress.id)} className={`text-xs px-2 py-1 rounded border transition-colors ${progress.isCompleted ? 'border-slate-300 text-slate-500 hover:bg-slate-200' : 'border-indigo-300 text-indigo-600 hover:bg-indigo-50'}`}>
                                                        {progress.isCompleted ? '撤销' : '手动结单'}
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-5 border-b border-slate-100 flex items-center space-x-2 bg-slate-50">
                                <span className="text-orange-500"><IconClock /></span><h3 className="text-lg font-bold text-slate-800">收款到期日历</h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[700px]">
                                    <thead className="bg-white text-slate-500 text-sm border-b border-slate-200">
                                        <tr><th className="p-4 font-medium">CI 号码 / PO关联</th><th className="p-4 font-medium">发货总金额 ($)</th><th className="p-4 font-medium">账期 / 到期日</th><th className="p-4 font-medium">收款状态 / 操作</th></tr>
                                    </thead>
                                    <tbody>
                                        {reminders.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-slate-400">暂无发货记录</td></tr>}
                                        {reminders.map((ci) => (
                                            <tr key={ci.id} className="border-b border-slate-100 hover:bg-slate-50">
                                                <td className="p-4">
                                                    <div className="font-bold text-indigo-600">{ci.ciNo}</div>
                                                    <div className="text-xs text-slate-500 mt-1">关联: {ci.poNo}</div>
                                                </td>
                                                <td className="p-4 font-semibold text-slate-800">{ci.totalAmount.toFixed(2)}</td>
                                                <td className="p-4"><div className="text-sm text-slate-600">{ci.paymentTerms} 天</div><div className="text-xs font-bold text-slate-500 mt-1">{ci.dueDate?.toLocaleDateString()}</div></td>
                                                <td className="p-4 flex items-center gap-2">
                                                    {ci.isPaid ? <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-slate-200 text-slate-600">已收款</span> : 
                                                     ci.daysLeft < 0 ? <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-red-100 text-red-700">逾期 {Math.abs(ci.daysLeft)} 天</span> : 
                                                     ci.daysLeft <= 7 ? <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-orange-100 text-orange-700">即将到期 ({ci.daysLeft}天)</span> : 
                                                     <span className="inline-flex px-2.5 py-1 rounded-md text-xs font-bold bg-emerald-100 text-emerald-700">正常 ({ci.daysLeft}天)</span>}
                                                    <button onClick={() => toggleCiPaid(ci.id)} className={`text-xs px-2 py-1 rounded border transition-colors ${ci.isPaid ? 'border-slate-300 text-slate-500 hover:bg-slate-200' : 'border-emerald-300 text-emerald-600 hover:bg-emerald-50'}`}>
                                                        {ci.isPaid ? '撤销' : '标为已收'}
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 视图: 客户订单 PO (第 1 步) ---
            const renderCustomerPOs = () => (
                <div className="space-y-6 fade-in">
                    <h2 className="text-2xl font-bold text-slate-800">1. 客户订单 (PO) - <span className="text-indigo-600 text-lg">所有数据源头</span></h2>
                    <form onSubmit={handleAddPO} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex flex-col md:flex-row gap-4 mb-6 pb-6 border-b border-slate-100">
                            <div className="flex-1 space-y-1">
                                <label className="text-sm font-semibold text-slate-600">客户 PO 号</label>
                                <input required type="text" value={newPO.poNo} onChange={e => setNewPO({...newPO, poNo: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="PO-..." />
                            </div>
                            <div className="flex-1 space-y-1">
                                <label className="text-sm font-semibold text-slate-600">接单日期</label>
                                <input required type="date" value={newPO.date} onChange={e => setNewPO({...newPO, date: e.target.value})} className="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                            </div>
                        </div>

                        <div className="space-y-3">
                            <label className="text-sm font-semibold text-slate-600">销售产品明细 (定义该订单的所有产品)</label>
                            {newPO.items.map((item) => {

                                    <input required type="number" min="1" placeholder="数量" value={item.quantity} onChange={e => handleItemChange(setNewPO, newPO, item.id, 'quantity', e.target.value)} className="w-full lg:w-[15%] p-2.5 text-sm bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />

                            <button type="submit" className="bg-slate-800 text-white font-bold px-8 py-2.5 rounded-lg hover:bg-slate-900 w-full md:w-auto">保存客户订单</button>

                    <div className="space-y-4">

                            let poTotal = 0; let poProfitTotal = 0;

                                    <div className="font-bold text-slate-800"><span className="text-indigo-700 mr-4">PO: {po.poNo}</span><span className="text-sm font-normal text-slate-600">日期: {po.date}</span></div>
                                    <div className="flex items-center gap-4 text-sm">
                                        <span className="font-bold text-slate-700 bg-white px-3 py-1 rounded-md border border-slate-200">订单总额: ${poTotal.toFixed(2)}</span>
                                        <span className="font-bold text-emerald-600 bg-white px-3 py-1 rounded-md border border-slate-200">预估总利: ${poProfitTotal.toFixed(2)}</span>
                                        <span className="font-bold text-blue-600 bg-white px-3 py-1 rounded-md border border-slate-200">利润率: {(poTotal > 0 ? (poProfitTotal / poTotal) * 100 : 0).toFixed(1)}%</span>

                                    </div>
                                </div>
                                <div className="p-0 overflow-x-auto">
                                    <table className="w-full text-left text-sm min-w-[800px]">
                                        <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                            <tr><th className="p-3 px-5 font-medium">产品型号 / 备注</th><th className="p-3 px-5 font-medium">数量</th><th className="p-3 px-5 font-medium">单价(售) / 成本(底)</th><th className="p-3 px-5 font-medium">该项总额 / 总利</th><th className="p-3 px-5 font-medium">利润率</th></tr>

                                                    </tr>

                                    </table>
                                </div>
                            </div>

                                            </div>

                            </div>

                            <div key={contract.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-slate-100 p-3 px-5 flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-200 gap-2">
                                    <div className="font-bold text-slate-800">
                                        <span className="text-purple-700 mr-4">合同: {contract.contractNo || '未编号'}</span>

                                        <span className="text-sm font-normal text-slate-500">日期: {contract.date}</span>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-bold text-slate-700 bg-white px-3 py-1 rounded-md border border-slate-200">采购总额: ${contractTotal.toFixed(2)}</span>

                                    </div>
                                </div>
                                <div className="p-0 overflow-x-auto">
                                    <table className="w-full text-left text-sm min-w-[600px]">
                                        <thead className="bg-slate-50 text-slate-500 border-b border-slate-100">
                                            <tr><th className="p-3 px-5 font-medium">产品型号</th><th className="p-3 px-5 font-medium">数量 (来自PO)</th><th className="p-3 px-5 font-medium">采购单价</th><th className="p-3 px-5 font-medium">采购小计</th><th className="p-3 px-5 font-medium">利润率</th></tr>
                                        </thead>
                                        <tbody>
                                            {contract.items.map(item => {

                                                const qty = parseFloat(poItem.quantity || 1);
                                                const cost = parseFloat(item.cost || 0);
                                                const price = parseFloat(poItem.price || 0);
                                                const margin = price > 0 ? ((price - cost) / price) * 100 : 0;
                                                return (
                                                <tr key={item.poItemId} className="border-b border-slate-100 last:border-0 hover:bg-slate-50">
                                                    <td className="p-3 px-5 font-bold text-slate-800">{poItem.model || '已删产品'}</td>
                                                    <td className="p-3 px-5 font-medium text-slate-700">{qty}</td>

                            </div>

                                </div>
                                <div className="space-y-1">
                                    <label className="text-sm font-semibold text-slate-600">账期 (天数)</label>

                                </div>

                                        return (
                                        <div key={item.poItemId} className="flex flex-col md:flex-row gap-4 items-center bg-slate-50 p-3 rounded-lg border border-slate-200">
                                            <div className="w-full md:w-1/2 flex justify-between items-center pr-4 border-r border-slate-200">
                                                <div>
                                                    <div className="font-bold text-slate-800">{poItem.model}</div>
                                                    <div className="text-xs text-slate-500">{poItem.description}</div>
                                                </div>
                                                <div className="text-sm text-slate-500 font-medium">售价: <span className="text-emerald-600 font-bold">${price.toFixed(2)}</span></div>

                                            <div className="w-full md:w-1/4 flex items-center">
                                                <span className="text-sm font-medium text-slate-500 mr-2 whitespace-nowrap">发货数量:</span>
                                                <input required type="number" min="0" value={item.shipQty} onChange={e => handleItemChange(setNewCI, newCI, item.poItemId, 'shipQty', e.target.value)} className="w-full p-2.5 text-sm bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none" />
                                            </div>
                                            <div className="w-full md:w-1/4 text-slate-800 text-sm font-bold pl-2 text-right">

                                            </div>
                                        </div>
                                    )})}
                                </div>

                            <div className="flex justify-end mt-6">
                                <button type="submit" disabled={!newCI.poId} className="bg-slate-800 text-white font-bold px-8 py-2.5 rounded-lg hover:bg-slate-900 w-full md:w-auto disabled:opacity-50">保存发货单</button>
                            </div>
                        </form>
                    )}

                        {shippingCIs.map((ci) => {

                            return (
                            <div key={ci.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">

                                    <div className="font-bold text-slate-800">
                                        <span className="text-emerald-700 mr-4">CI: {ci.ciNo}</span>
                                        <span className="text-indigo-600 text-sm bg-indigo-100 px-2 py-0.5 rounded mr-4">归属PO: {po?.poNo || 'PO已删'}</span>

                                        <span className="font-bold text-emerald-700 bg-white px-3 py-1 rounded-md border border-slate-200">发货单总计: ${total.toFixed(2)}</span>

                                            <tr><th className="p-3 px-5 font-medium">产品型号</th><th className="p-3 px-5 font-medium">发货数量</th><th className="p-3 px-5 font-medium">固定单价 (来自PO)</th><th className="p-3 px-5 font-medium">该项金额</th></tr>
                                        </thead>
                                        <tbody>
                                            {ci.items.map(item => {
                                                const poItem = getPoItem(ci.poId, item.poItemId);
                                                const qty = parseFloat(item.shipQty || 0);
                                                const price = parseFloat(poItem.price || 0);
                                                return (
                                                <tr key={item.poItemId} className="border-b border-slate-100 last:border-0 hover:bg-slate-50">

                                    </table>
                                </div>
                            </div>
                        )})}
                    </div>
                </div>
            );

                <button 
                    onClick={() => setActiveTab(id)} 
                    className={`w-full flex items-center p-3 rounded-xl transition-all font-bold text-sm ${activeTab === id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-indigo-50 hover:text-indigo-700'}`}

                    <div className="w-full md:w-64 bg-white border-r border-slate-200 shadow-sm flex-shrink-0 z-10 flex flex-col">
                        <div className="p-6 border-b border-slate-100">
                            <h1 className="text-xl font-black text-indigo-700 flex items-center tracking-tight"><span className="bg-indigo-100 p-2 rounded-xl mr-2"><IconTrend /></span>订单管家 PRO</h1>
                        </div>
                        <nav className="p-4 space-y-2 flex-1">
                            <NavItem id="dashboard" icon={IconDashboard} label="概览与提醒" />
                            <NavItem id="customer_pos" icon={IconCart} label="1. PO 客户订单" />
                            <NavItem id="supplier_contracts" icon={IconFactory} label="2. SC 工厂合同" />
                            <NavItem id="shipping_cis" icon={IconFile} label="3. CI 发货出单" />
                        </nav>
                        
                        <div className="p-4 border-t border-slate-100 bg-slate-50">
                            <p className="text-xs text-slate-400 mb-3 font-semibold text-center">数据保存在浏览器中，建议定期备份</p>
                            <div className="flex gap-2">
                                <button onClick={handleExport} className="flex-1 flex items-center justify-center p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-100 transition-colors"><span className="mr-1"><IconDownload /></span> 导出备份</button>
                                <label className="flex-1 flex items-center justify-center p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-100 transition-colors cursor-pointer"><span className="mr-1"><IconUpload /></span> 恢复数据<input type="file" accept=".json" className="hidden" onChange={handleImport} /></label>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-4 md:p-8 overflow-y-auto">
                        <div className="max-w-5xl mx-auto pb-20">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'customer_pos' && renderCustomerPOs()}
                            {activeTab === 'supplier_contracts' && renderSupplierContracts()}
                            {activeTab === 'shipping_cis' && renderShippingCIs()}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
